<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | KachraDarpan Officer Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="justify-content: center;">

    <header>
        <div style="font-weight: 800; font-size: 1.5rem; letter-spacing: -1px;">Kachra<span class="highlight">Darpan</span></div>
        <nav>
            <a href="index.html">User Portal</a>
        </nav>
    </header>

    <div class="glass-card">
        <h2 style="text-align: center; font-size: 2rem; margin-bottom: 20px;">Authority <span class="highlight">Login</span></h2>
        <p style="text-align: center; color: var(--text-dim); margin-bottom: 30px;">Access your jurisdictional waste management dashboard.</p>

        <div class="role-selector" id="role-selector">
            <div class="role-chip active" onclick="selectRole(this, 'Mayor')">Mayor Office</div>
            <div class="role-chip" onclick="selectRole(this, 'Officer')">Zonal Officer</div>
            <div class="role-chip" onclick="selectRole(this, 'GramPanchayat')">Gram Panchayat</div>
        </div>

        <form id="login-form">
            <div class="input-group">
                <label>Officer ID / Email</label>
                <input type="text" id="username" placeholder="e.g., officer_77" required>
            </div>

            <div class="input-group">
                <label>Access Key</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <div class="password-toggle" id="toggle-btn" onclick="togglePassword()">
                    <svg id="eye-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </div>
                <div style="text-align: right; margin-top: 5px;">
                    <a href="forgot-password.html" class="highlight" style="text-decoration: none; font-size: 0.8rem;">Forgot Password?</a>
                </div>
            </div>

            <div class="input-group" id="otp-group" style="display: none;">
                <label>Verification Code (OTP)</label>
                <input type="text" id="otp" placeholder="Enter 6-digit code" maxlength="6">
                <div style="text-align: right; margin-top: 5px;">
                    <button type="button" id="resend-btn" onclick="handleResend()" style="background: none; border: none; color: var(--highlight); cursor: pointer; font-size: 0.8rem; padding: 0;">Resend OTP</button>
                    <span id="timer-text" style="font-size: 0.8rem; color: var(--text-dim); display: none;">Resend in <span id="timer-count">30</span>s</span>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="btn-premium">
                <span id="btn-text">Request OTP</span>
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14m-7-7 7 7-7 7"></path></svg>
            </button>
        </form>

        <p id="error-msg" style="color: var(--danger); text-align: center; margin-top: 20px; font-size: 0.9rem; display: none;">Invalid credentials. Please try again.</p>
        
        <div style="text-align: center; margin-top: 30px; font-size: 0.9rem; color: var(--text-dim);">
            New Officer?  <a href="register.html" class="highlight" style="text-decoration: none;">Create an Account here</a>
        </div>
    </div>
    

    <footer style="margin-top: 40px; color: var(--text-dim); font-size: 0.8rem;">
        &copy; KachraDarpan
            <p>&copy;Dev By Neel</p>
        
    </footer>

    <script>
        const BASE_URL = window.location.origin.includes('localhost') 
  ? 'http://localhost:4000' 
  : 'https://kachradarpan-backend.onrender.com';
        let selectedRole = 'Mayor';
        let isOtpSent = false;

        function selectRole(el, role) {
            if (isOtpSent) return; // Prevent role change after OTP is sent
            document.querySelectorAll('.role-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            selectedRole = role;
        }

        function togglePassword() {
            const passInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                passInput.type = 'password';
                eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        async function requestOtp() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const otpGroup = document.getElementById('otp-group');
            const btnText = document.getElementById('btn-text');
            const submitBtn = document.getElementById('submit-btn');

            if (!username || !password) {
                errorMsg.innerText = "Please fill in all fields.";
                errorMsg.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            btnText.innerText = "Processing...";

            try {
                const res = await fetch(`${BASE_URL}/api/auth/request-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role: selectedRole })
                });
                
                const data = await res.json();

                if (res.ok) {
                    isOtpSent = true;
                    otpGroup.style.display = 'block';
                    btnText.innerText = "Verify & Login";
                    errorMsg.style.display = 'block';
                    errorMsg.style.color = 'var(--highlight)';
                    errorMsg.innerText = data.message;
                    
                    if (data.mock) {
                         const notice = document.createElement('div');
                         notice.style.fontSize = '0.7rem';
                         notice.style.color = 'var(--text-dim)';
                         notice.style.marginTop = '4px';
                         notice.innerText = "(Developer Notice: SMS simulation active. View OTP in server console)";
                         errorMsg.appendChild(notice);
                    }

                    // Optional: Disable credential fields
                    document.getElementById('username').disabled = true;
                    document.getElementById('password').disabled = true;
                    document.querySelectorAll('.role-chip').forEach(c => c.style.opacity = '0.5');

                    startTimer(30);
                } else {
                    errorMsg.innerText = data.error || 'Failed to request OTP.';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = 'Server error. Please ensure the backend is running.';
                errorMsg.style.display = 'block';
            } finally {
                if (!isOtpSent) {
                    submitBtn.disabled = false;
                    btnText.innerText = "Request OTP";
                } else {
                    submitBtn.disabled = false;
                }
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!isOtpSent) {
                await requestOtp();
                return;
            }

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const otp = document.getElementById('otp').value;
            const errorMsg = document.getElementById('error-msg');
        

            if (!otp) {
                errorMsg.innerText = "Please enter the verification code.";
                errorMsg.style.display = 'block';
                return;
            }

            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            submitBtn.disabled = true;
            const originalText = btnText.innerText;
            btnText.innerText = "Verifying...";

            try {
                const res = await fetch(`${BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role: selectedRole, otp })
                });
                
                const data = await res.json();

                if (res.ok && data.success) {
                    localStorage.setItem('kd_user', JSON.stringify(data.user));
                    localStorage.setItem('kd_token', data.token);
                    
                    errorMsg.style.display = 'none';
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.innerText = data.error || 'Invalid OTP. Please try again.';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = 'Login error. Please check your connection.';
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                btnText.innerText = originalText;
            }
        });

        let timerInterval;
        function startTimer(seconds) {
            const resendBtn = document.getElementById('resend-btn');
            const timerText = document.getElementById('timer-text');
            const timerCount = document.getElementById('timer-count');
            
            resendBtn.style.display = 'none';
            timerText.style.display = 'inline';
            timerCount.innerText = seconds;

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                seconds--;
                timerCount.innerText = seconds;
                if (seconds <= 0) {
                    clearInterval(timerInterval);
                    resendBtn.style.display = 'inline';
                    timerText.style.display = 'none';
                }
            }, 1000);
        }

        async function handleResend() {
            const resendBtn = document.getElementById('resend-btn');
            resendBtn.disabled = true;
            await requestOtp();
            // startTimer handles re-enabling/hiding
        }
    </script>
</body>
</html>
