<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | KachraDarpan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="justify-content: center;">

    <header>
        <div style="font-weight: 800; font-size: 1.5rem; letter-spacing: -1px;">Kachra<span class="highlight">Darpan</span></div>
        <nav>
            <a href="login.html">Back to Login</a>
        </nav>
    </header>

    <div class="glass-card">
        <h2 style="text-align: center; font-size: 2rem; margin-bottom: 10px;">Reset <span class="highlight">Password</span></h2>
        <p id="step-desc" style="text-align: center; color: var(--text-dim); margin-bottom: 30px;">Enter your Officer ID or official email to receive a reset code.</p>

        <!-- Step 1: Identify -->
        <form id="identify-form">
            <div class="input-group">
                <label>Officer ID / Email</label>
                <input type="text" id="identifier" placeholder="e.g., officer_77" required>
            </div>
            <button type="submit" class="btn-premium">
                <span>Send Reset Code</span>
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14m-7-7 7 7-7 7"></path></svg>
            </button>
        </form>

        <!-- Step 2: Verify & Reset -->
        <form id="reset-form" style="display: none;">
            <div class="input-group">
                <label>Verification Code (OTP)</label>
                <input type="text" id="otp" placeholder="Enter 6-digit code" maxlength="6" required>
            </div>
            <div class="input-group">
                <label>New Access Key</label>
                <input type="password" id="new-password" placeholder="Min. 8 characters" required minlength="8">
            </div>
            <div class="input-group">
                <label>Confirm Access Key</label>
                <input type="password" id="confirm-password" placeholder="Re-enter password" required>
            </div>
            <p id="password-mismatch" style="color: var(--danger); font-size: 0.8rem; margin-top: -10px; margin-bottom: 15px; display: none;">Passwords do not match.</p>
            
            <button type="submit" class="btn-premium">
                <span>Update Password</span>
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14m-7-7 7 7-7 7"></path></svg>
            </button>
        </form>

        <p id="status-msg" style="text-align: center; margin-top: 20px; font-size: 0.9rem; display: none; padding: 10px; border-radius: 5px;"></p>
        
        <div style="text-align: center; margin-top: 30px; font-size: 0.9rem; color: var(--text-dim);">
            Remembered your password? <a href="login.html" class="highlight" style="text-decoration: none;">Login here</a>
        </div>
    </div>

    <footer style="margin-top: 40px; color: var(--text-dim); font-size: 0.8rem;">
        &copy; 2026 KachraDarpan™ Government of India Initiative
    </footer>

    <script>
        const BASE_URL = "http://localhost:4000"; 
        let currentUsername = "";

        const statusMsg = document.getElementById('status-msg');
        const identifyForm = document.getElementById('identify-form');
        const resetForm = document.getElementById('reset-form');
        const stepDesc = document.getElementById('step-desc');

        function showStatus(msg, type = 'error') {
            statusMsg.innerText = msg;
            statusMsg.style.display = 'block';
            statusMsg.style.color = type === 'error' ? 'var(--danger)' : 'var(--highlight)';
            statusMsg.style.background = type === 'error' ? 'rgba(255, 71, 87, 0.1)' : 'rgba(46, 213, 115, 0.1)';
        }

        // Step 1: Request Reset OTP
        identifyForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const identifier = document.getElementById('identifier').value;
            
            try {
                const res = await fetch(`${BASE_URL}/api/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier })
                });
                
                const data = await res.json();

                if (res.ok) {
                    currentUsername = data.username;
                    identifyForm.style.display = 'none';
                    resetForm.style.display = 'block';
                    stepDesc.innerText = "Enter the code sent to your email and choose a new password.";
                    showStatus(data.message, 'success');
                    
                    if (data.mock) {
                         const devNotice = document.createElement('div');
                         devNotice.style.fontSize = '0.7rem';
                         devNotice.style.marginTop = '5px';
                         devNotice.style.color = 'var(--text-dim)';
                         devNotice.innerText = "(Dev: View OTP in server terminal)";
                         statusMsg.appendChild(devNotice);
                    }
                } else {
                    showStatus(data.error);
                }
            } catch (err) {
                showStatus('Connection error. Is the backend running?');
            }
        });

        // Step 2: Reset Password
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = document.getElementById('otp').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const mismatchMsg = document.getElementById('password-mismatch');

            if (newPassword !== confirmPassword) {
                mismatchMsg.style.display = 'block';
                return;
            } else {
                mismatchMsg.style.display = 'none';
            }

            try {
                const res = await fetch(`${BASE_URL}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUsername, otp, newPassword })
                });
                
                const data = await res.json();

                if (res.ok) {
                    showStatus(data.message, 'success');
                    resetForm.style.display = 'none';
                    stepDesc.innerText = "Your password has been updated securely.";
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    showStatus(data.error);
                }
            } catch (err) {
                showStatus('Error resetting password. Please try again.');
            }
        });
    </script>
</body>
</html>
